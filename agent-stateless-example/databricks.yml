bundle:
  name: agent_stateless_example

resources:
  apps:
    agent_stateless_example:
      name: "agent-stateless-example"
      description: "Stateless LangGraph agent with web search and code execution"
      source_code_path: ./
      config:
        command: ["uv", "run", "start-app"]
        env:
          - name: MLFLOW_TRACKING_URI
            value: "databricks"
          - name: MLFLOW_REGISTRY_URI
            value: "databricks-uc"
          - name: API_PROXY
            value: "http://localhost:8000/invocations"
          - name: CHAT_APP_PORT
            value: "3000"
          - name: CHAT_PROXY_TIMEOUT_SECONDS
            value: "300"
          - name: MLFLOW_EXPERIMENT_ID
            value_from: "experiment"
          - name: LOG_LEVEL
            value: "INFO"

      resources:
        - name: 'experiment'
          experiment:
            experiment_id: "<your-experiment-id>"
            permission: 'CAN_MANAGE'
        - name: 'you-com-search'
          uc_securable:
            securable_type: 'CONNECTION'
            securable_full_name: 'you-com-search'
            permission: 'USE_CONNECTION'
        - name: 'python-exec'
          uc_securable:
            securable_type: 'FUNCTION'
            securable_full_name: 'system.ai.python_exec'
            permission: 'EXECUTE'
        - name: 'expense-data'
          genie_space:
            name: '<your-genie-space-name>'
            space_id: '<your-genie-space-id>'
            permission: 'CAN_RUN'

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: <your-workspace-url>

  prod:
    mode: production
    workspace:
      host: <your-workspace-url>
    resources:
      apps:
        agent_stateless_example:
          name: agent-stateless-example
