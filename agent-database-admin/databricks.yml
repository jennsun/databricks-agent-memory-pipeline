bundle:
  name: agent_database_admin

resources:
  apps:
    agent_database_admin:
      name: "agent-database-admin"
      description: "LangGraph agent that manages an agent-wide long-term memory store"
      source_code_path: ./
      config:
        command: ["uv", "run", "start-app"]
        env:
          - name: MLFLOW_TRACKING_URI
            value: "databricks"
          - name: MLFLOW_REGISTRY_URI
            value: "databricks-uc"
          - name: API_PROXY
            value: "http://localhost:8000/invocations"
          - name: CHAT_APP_PORT
            value: "3000"
          - name: CHAT_PROXY_TIMEOUT_SECONDS
            value: "300"
          - name: MLFLOW_EXPERIMENT_ID
            value_from: "experiment"
          - name: LAKEBASE_AUTOSCALING_ENDPOINT
            value_from: "postgres"
          - name: LAKEBASE_AGENT_MEMORY_SCHEMA
            value: "memories"
          - name: LOG_LEVEL
            value: "INFO"
          - name: DATABRICKS_EMBEDDING_ENDPOINT
            value: "databricks-gte-large-en"

      # Resources which this app has access to
      resources:
        - name: 'experiment'
          experiment:
            experiment_id: "<your-experiment-id>"
            permission: 'CAN_MANAGE'
        - name: 'postgres'
          postgres:
            branch: "projects/<your-agent-memory-project>/branches/<your-agent-memory-branch>"
            database: "projects/<your-agent-memory-project>/branches/<your-agent-memory-branch>/databases/databricks-postgres"
            permission: 'CAN_CONNECT_AND_CREATE'

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: <your-workspace-url>

  prod:
    mode: production
    workspace:
      host: <your-workspace-url>
    resources:
      apps:
        agent_database_admin:
          name: agent-database-admin
